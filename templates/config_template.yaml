# ==============================================================================
# Pumping Test Configuration File — YAML Template
# All fields shown. Required fields are marked [REQUIRED].
# Optional fields can be removed or left as-is.
# Paths to CSV files are relative to the location of this config file.
# Reference: ICRC (2011), Technical Review — Practical Guidelines for
#            Test Pumping in Water Wells.
# ==============================================================================

# ------------------------------------------------------------------------------
# Borehole Information
# ------------------------------------------------------------------------------
borehole:
  name: YOUR_BOREHOLE_NAME           # [REQUIRED] e.g. BH01
  static_level_mbd: 0.0              # [REQUIRED] Static water level [m below datum]

  # Optional record-keeping fields
  depth_m: 0.0                       # Total borehole depth [m]
  diameter_mm: 0.0                   # Casing diameter [mm] — minimum 70 mm
  pump_depth_mbd: 0.0                # Pump intake depth [m below datum]
  datum_height_m: 0.0                # Datum height above ground level [m]
  datum_description: YOUR_DATUM      # e.g. "Top of casing", "Ground level"
  location: YOUR_LOCATION            # e.g. "Village, District, Country"
  gps: [0.0, 0.0]                    # [latitude, longitude] decimal degrees
  pump_type: YOUR_PUMP_TYPE          # e.g. "Grundfos SP5A-18"

# ------------------------------------------------------------------------------
# Test metadata (optional, applies to all tests in this file)
# ------------------------------------------------------------------------------
test_date: "YYYY-MM-DD"              # ISO format date, e.g. "2026-03-01"
operator: YOUR_NAME                  # Name of the person conducting the test

# ------------------------------------------------------------------------------
# Constant-Rate Test
# Remove this section if not applicable.
# ------------------------------------------------------------------------------
constant_rate:
  csv_file: "data/constant_rate.csv" # [REQUIRED] Path to CSV data file
  flowrate_m3h: 0.0                  # [REQUIRED] Average pumping rate [m³/h]
  fit_start_idx: 1                   # First measurement index for Cooper-Jacob fit
  fit_end_idx:                       # Last index (exclusive); leave blank to use all points

# ------------------------------------------------------------------------------
# Recovery Test
# Remove this section if not applicable.
# ------------------------------------------------------------------------------
recovery:
  csv_file: "data/recovery.csv"      # [REQUIRED] Path to CSV data file
  flowrate_m3h: 0.0                  # [REQUIRED] Pumping rate during preceding pumping phase [m³/h]
  end_of_pumping_min: 0.0            # [REQUIRED] Elapsed time when pumping stopped [min]
  fit_start_idx: 1                   # First measurement index for Theis recovery fit
  fit_end_idx:                       # Last index (exclusive); leave blank to use all points

# ------------------------------------------------------------------------------
# Step-Drawdown Test
# Remove this section if not applicable.
# Each step requires a flowrate and the elapsed time at the END of that step.
# Steps must be listed in order, with increasing flowrates.
# ------------------------------------------------------------------------------
step_drawdown:
  csv_file: "data/step_drawdown.csv" # [REQUIRED] Path to CSV data file
  steps:                             # [REQUIRED] Minimum 2 steps
    - flowrate_m3h: 0.0              # Pumping rate for step 1 [m³/h]
      end_time_min: 0.0              # Elapsed time at end of step 1 [min]
    - flowrate_m3h: 0.0              # Pumping rate for step 2 [m³/h]
      end_time_min: 0.0              # Elapsed time at end of step 2 [min]
    - flowrate_m3h: 0.0              # Pumping rate for step 3 [m³/h] (optional)
      end_time_min: 0.0              # Elapsed time at end of step 3 [min] (optional)
    - flowrate_m3h: 0.0              # Pumping rate for step 4 [m³/h] (optional)
      end_time_min: 0.0              # Elapsed time at end of step 4 [min] (optional)
